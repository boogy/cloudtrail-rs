name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload artifacts
      packages: write # push images to GHCR
      id-token: write # cosign keyless + provenance OIDC
      attestations: write # actions/attest-build-provenance
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          cache: false

      - name: Install zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-zigbuild

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_NAMESPACE: ${{ github.repository_owner }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKER_HUB_USER }}
          # PAT with repo scope on the Homebrew tap repo — the default
          # GITHUB_TOKEN can't push to a different repository.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Attest build provenance for archives
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

  scan:
    name: Scan images
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        module: [lambda-s3, lambda-sns, lambda-sqs, lambda-eventbridge]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref
        id: ref
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "image=ghcr.io/${{ github.repository_owner }}/cloudtrail-rs:${{ matrix.module }}-${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Wait for image to be pullable
        run: |
          for i in $(seq 1 10); do
            if docker pull "${{ steps.ref.outputs.image }}"; then
              exit 0
            fi
            echo "image not ready yet (attempt $i), retrying in 15s..."
            sleep 15
          done
          echo "image never became pullable: ${{ steps.ref.outputs.image }}"
          exit 1

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Summary
        if: always()
        run: |
          {
            echo "### ${{ matrix.module }} — ${{ steps.ref.outputs.version }}"
            echo ""
            echo "Image: \`${{ steps.ref.outputs.image }}\`"
            echo ""
            echo "Deploy to Lambda (container image):"
            echo '```sh'
            echo "aws lambda update-function-code \\"
            echo "  --function-name my-${{ matrix.module }} \\"
            echo "  --image-uri ${{ steps.ref.outputs.image }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
