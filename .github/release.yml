# Configures GitHub's auto-generated release notes (the release job runs
# softprops/action-gh-release with generate_release_notes: true).
#
# Categorization is by PR LABEL, not commit-message prefix. Dependabot PRs are
# labeled `dependencies` automatically; label your own PRs (feature/bug/docs/ci)
# to route them, otherwise they fall into "Other Changes" via the catch-all.
changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - fix
        - bug
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 CI / Build
      labels:
        - ci
        - build
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
